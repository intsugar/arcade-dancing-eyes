<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Dancing Eyes — Namco System 11 Arcade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

    body {
      background: #0a0a0f;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      font-family: 'Press Start 2P', monospace;
      padding: 14px 8px 30px;
    }

    /* ── Cabinet shell ── */
    .cabinet {
      width: 100%;
      max-width: 660px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* ── Header ── */
    .cab-header {
      background: #111118;
      border: 2px solid #2a2838;
      border-bottom: none;
      padding: 10px 14px 8px;
      text-align: center;
    }

    .system-label {
      color: #5548a0;
      font-size: 0.38rem;
      letter-spacing: 3px;
      margin-bottom: 5px;
    }

    .game-title {
      color: #f0e8ff;
      font-size: 1.1rem;
      text-shadow: 3px 3px 0 #3a2888;
      letter-spacing: 2px;
    }

    /* ── Screen ── */
    .screen-section {
      background: #0a0a12;
      border-left: 2px solid #2a2838;
      border-right: 2px solid #2a2838;
      padding: 8px;
      position: relative;
    }

    .screen-bezel {
      background: #050510;
      border: 3px solid #1c1a2c;
      box-shadow: inset 0 0 0 2px #080814;
      position: relative;
    }

    .screen-inner {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      background: #000;
      overflow: hidden;
    }

    /* scanlines */
    .screen-inner::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 3px,
        rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px
      );
      pointer-events: none;
      z-index: 10;
    }

    #game {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* Kill EmulatorJS's own mobile overlay */
    #game canvas { display: block; }

    /* ── Loading overlay ── */
    .load-overlay {
      position: absolute;
      inset: 0;
      background: #000;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      transition: opacity 0.8s;
    }

    .load-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .load-title {
      color: #f0e8ff;
      font-size: 0.6rem;
      letter-spacing: 2px;
      text-shadow: 2px 2px 0 #3a2888;
    }

    .load-bar-wrap {
      width: 60%;
      height: 10px;
      background: #1a1828;
      border: 2px solid #3a3848;
    }

    .load-bar {
      height: 100%;
      background: #6858b8;
      width: 0%;
      animation: fillbar 18s linear forwards;
    }

    @keyframes fillbar {
      0%   { width: 0%; }
      30%  { width: 35%; }
      60%  { width: 65%; }
      90%  { width: 92%; }
      100% { width: 100%; }
    }

    .load-status {
      color: #5548a0;
      font-size: 0.3rem;
      letter-spacing: 1px;
      animation: blink-text 1s infinite;
    }

    @keyframes blink-text {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Control panel ── */
    .control-panel {
      background: #161420;
      border: 2px solid #2a2838;
      border-top: 3px solid #3a3050;
      padding: 16px 20px 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* COIN + START row */
    .service-row {
      display: flex;
      justify-content: center;
      gap: 18px;
    }

    .svc-btn {
      background: #1e1c2c;
      border: 2px solid #3a3848;
      box-shadow: 3px 3px 0 #0a0814;
      color: #9898c0;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.3rem;
      letter-spacing: 1px;
      padding: 7px 14px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: none;
    }

    .svc-btn:active {
      transform: translate(3px, 3px);
      box-shadow: none;
      color: #e0d8ff;
    }

    /* Joystick + buttons row */
    .play-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 10px;
    }

    /* ── Joystick ── */
    .joystick-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .joystick-base {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #2e2c3e, #141220);
      border: 3px solid #3a3848;
      box-shadow: 3px 3px 0 #0a0814, inset 0 2px 4px rgba(0,0,0,0.5);
      position: relative;
      touch-action: none;
    }

    .joystick-stick {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #4a4860, #1c1a28);
      border: 2px solid #5a5870;
      transform: translate(-50%, -50%);
      box-shadow: 2px 2px 0 #0a0814;
      transition: transform 0.08s;
      pointer-events: none;
    }

    .joystick-label {
      color: #4a4868;
      font-size: 0.26rem;
      letter-spacing: 1px;
    }

    /* ── Action buttons ── */
    .action-buttons {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .action-row {
      display: flex;
      gap: 18px;
      align-items: center;
    }

    .action-btn-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .action-btn {
      width: 62px;
      height: 62px;
      border-radius: 50%;
      border: 3px solid;
      box-shadow: 4px 4px 0;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      position: relative;
    }

    .action-btn::after {
      content: '';
      position: absolute;
      top: 6px;
      left: 8px;
      width: 18px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      transform: rotate(-30deg);
      pointer-events: none;
    }

    .action-btn:active,
    .action-btn.pressed {
      transform: translate(4px, 4px);
      box-shadow: none !important;
    }

    .btn-1 {
      background: radial-gradient(circle at 40% 35%, #cc3333, #881111);
      border-color: #aa2222;
      box-shadow: 4px 4px 0 #441111;
    }

    .btn-2 {
      background: radial-gradient(circle at 40% 35%, #3355cc, #112288);
      border-color: #2244aa;
      box-shadow: 4px 4px 0 #111144;
    }

    .action-label {
      color: #4a4868;
      font-size: 0.26rem;
      letter-spacing: 1px;
    }

    /* keyboard hint strip */
    .key-hint {
      color: #2e2c40;
      font-size: 0.24rem;
      text-align: center;
      letter-spacing: 1px;
      line-height: 1.8;
    }
  </style>
</head>
<body>

<div class="cabinet">

  <div class="cab-header">
    <div class="system-label">NAMCO SYSTEM 11 — ARCADE 1996</div>
    <div class="game-title">Dancing Eyes</div>
  </div>

  <div class="screen-section">
    <div class="screen-bezel">
      <div class="screen-inner">
        <div id="game"></div>
        <div class="load-overlay" id="load-overlay">
          <div class="load-title">DANCING EYES</div>
          <div class="load-bar-wrap"><div class="load-bar"></div></div>
          <div class="load-status" id="load-status">LOADING ROM...</div>
        </div>
      </div>
    </div>
  </div>

  <div class="control-panel">

    <!-- COIN / START -->
    <div class="service-row">
      <button class="svc-btn" id="btn-coin">INSERT COIN</button>
      <button class="svc-btn" id="btn-start">PLAYER START</button>
    </div>

    <!-- Joystick + Action buttons -->
    <div class="play-row">

      <div class="joystick-wrap">
        <div class="joystick-base" id="joystick">
          <div class="joystick-stick" id="stick"></div>
        </div>
        <div class="joystick-label">JOYSTICK</div>
      </div>

      <div class="action-buttons">
        <div class="action-row">
          <div class="action-btn-wrap">
            <div class="action-btn btn-1" id="btn-action1"></div>
            <div class="action-label">BTN 1</div>
          </div>
          <div class="action-btn-wrap">
            <div class="action-btn btn-2" id="btn-action2"></div>
            <div class="action-label">BTN 2</div>
          </div>
        </div>
      </div>

    </div>

    <div class="key-hint">
      KEYBOARD: 5=COIN &nbsp; 1=START &nbsp; ARROWS=MOVE &nbsp; Z X=BUTTONS
    </div>

  </div>
</div>

<script>
  // ── EmulatorJS setup ──
  EJS_player = '#game';
  EJS_gameUrl = 'danceyes.zip';
  EJS_core = 'mame2010';
  EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
  EJS_AdditionalFiles = [
    { url: 'namcoc76.zip', fileName: 'namcoc76.zip' }
  ];
  EJS_color = '#5548a0';
  EJS_Buttons = { mute: false, settings: true, fullscreen: true };
  EJS_mobileInputMode = 'none';
</script>
<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

<script>
  // ── Auto-start sequence ──
  const overlay = document.getElementById('load-overlay');
  const loadStatus = document.getElementById('load-status');

  function tap(code, key) {
    document.dispatchEvent(new KeyboardEvent('keydown', { code, key, bubbles: true }));
    setTimeout(() => document.dispatchEvent(new KeyboardEvent('keyup', { code, key, bubbles: true })), 120);
  }

  function coinAndStart() {
    tap('Digit5', '5');
    setTimeout(() => tap('Digit1', '1'), 700);
  }

  // Step 1 — close RetroArch menu as soon as EJS initializes
  setTimeout(() => {
    tap('F1', 'F1');
    loadStatus.textContent = 'BOOTING SYSTEM...';
  }, 3500);

  // Step 2 — hide overlay, first coin+start attempt
  setTimeout(() => {
    overlay.classList.add('hidden');
    coinAndStart();
  }, 14000);

  // Step 3 — second attempt (catches slower loads / longer boot sequences)
  setTimeout(coinAndStart, 24000);

  // Step 4 — final attempt
  setTimeout(coinAndStart, 36000);

  // ── Hide EmulatorJS's built-in mobile overlay ──
  const killPad = () => {
    document.querySelectorAll(
      '[class*="virtualpad"],[class*="mobile_btn"],[class*="ejs_mobile"],[id*="ejs_virtual"],[class*="ejs_virtual"]'
    ).forEach(el => { el.style.display = 'none'; el.style.pointerEvents = 'none'; });
  };
  new MutationObserver(killPad).observe(document.body, { childList: true, subtree: true });

  // ── Key dispatch helpers ──
  function press(code, key) {
    document.dispatchEvent(new KeyboardEvent('keydown', { code, key, bubbles: true }));
  }
  function release(code, key) {
    document.dispatchEvent(new KeyboardEvent('keyup', { code, key, bubbles: true }));
  }

  // ── Service buttons ──
  document.getElementById('btn-coin').addEventListener('pointerdown', e => {
    e.preventDefault(); press('Digit5', '5');
  });
  document.getElementById('btn-coin').addEventListener('pointerup', e => {
    e.preventDefault(); release('Digit5', '5');
  });
  document.getElementById('btn-start').addEventListener('pointerdown', e => {
    e.preventDefault(); press('Digit1', '1');
  });
  document.getElementById('btn-start').addEventListener('pointerup', e => {
    e.preventDefault(); release('Digit1', '1');
  });

  // ── Action buttons ──
  const actionMap = {
    'btn-action1': { code: 'KeyZ', key: 'z' },
    'btn-action2': { code: 'KeyX', key: 'x' }
  };
  Object.entries(actionMap).forEach(([id, { code, key }]) => {
    const el = document.getElementById(id);
    el.addEventListener('pointerdown', e => { e.preventDefault(); el.classList.add('pressed'); press(code, key); });
    el.addEventListener('pointerup',   e => { e.preventDefault(); el.classList.remove('pressed'); release(code, key); });
    el.addEventListener('pointercancel', e => { el.classList.remove('pressed'); release(code, key); });
  });

  // ── Joystick ──
  const joystickBase = document.getElementById('joystick');
  const stick = document.getElementById('stick');
  const DEAD = 14;
  const MAX_OFFSET = 30;
  let activeDirections = new Set();
  let joyActive = false;
  let joyOrigin = { x: 0, y: 0 };
  let joyId = null;

  const DIR_MAP = {
    up:    { code: 'ArrowUp',    key: 'ArrowUp' },
    down:  { code: 'ArrowDown',  key: 'ArrowDown' },
    left:  { code: 'ArrowLeft',  key: 'ArrowLeft' },
    right: { code: 'ArrowRight', key: 'ArrowRight' }
  };

  function setDirs(newDirs) {
    activeDirections.forEach(d => { if (!newDirs.has(d)) { release(DIR_MAP[d].code, DIR_MAP[d].key); } });
    newDirs.forEach(d => { if (!activeDirections.has(d)) { press(DIR_MAP[d].code, DIR_MAP[d].key); } });
    activeDirections = newDirs;
  }

  function getDirs(dx, dy) {
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < DEAD) return new Set();
    const angle = Math.atan2(dy, dx) * 180 / Math.PI;
    const dirs = new Set();
    if (angle > -135 && angle < -45)  dirs.add('up');
    if (angle > 45  && angle < 135)   dirs.add('down');
    if (Math.abs(angle) > 135)        dirs.add('left');
    if (Math.abs(angle) < 45)         dirs.add('right');
    // diagonals
    if (angle > -135 && angle < -45) {} // already up
    if (angle > -70 && angle < -20)  { dirs.add('up'); dirs.add('right'); }
    if (angle > 20  && angle < 70)   { dirs.add('down'); dirs.add('right'); }
    if (angle > 110 || angle < -110) { dirs.add('left'); }
    if (angle > -160 && angle < -110){ dirs.add('left'); dirs.add('up'); }
    if (angle > 110 && angle < 160)  { dirs.add('left'); dirs.add('down'); }
    return dirs;
  }

  function moveStick(dx, dy) {
    const dist = Math.sqrt(dx * dx + dy * dy);
    const capped = Math.min(dist, MAX_OFFSET);
    const ratio = dist > 0 ? capped / dist : 0;
    stick.style.transform = `translate(calc(-50% + ${dx * ratio}px), calc(-50% + ${dy * ratio}px))`;
  }

  joystickBase.addEventListener('pointerdown', e => {
    e.preventDefault();
    joyActive = true;
    joyId = e.pointerId;
    const r = joystickBase.getBoundingClientRect();
    joyOrigin = { x: r.left + r.width / 2, y: r.top + r.height / 2 };
    joystickBase.setPointerCapture(e.pointerId);
  });

  joystickBase.addEventListener('pointermove', e => {
    if (!joyActive || e.pointerId !== joyId) return;
    e.preventDefault();
    const dx = e.clientX - joyOrigin.x;
    const dy = e.clientY - joyOrigin.y;
    moveStick(dx, dy);
    setDirs(getDirs(dx, dy));
  });

  function joyEnd(e) {
    if (e.pointerId !== joyId) return;
    joyActive = false;
    stick.style.transform = 'translate(-50%, -50%)';
    setDirs(new Set());
  }
  joystickBase.addEventListener('pointerup', joyEnd);
  joystickBase.addEventListener('pointercancel', joyEnd);
</script>
</body>
</html>
